<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fatiha.app — Art Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d12; color: #e8e0d0; font-family: 'Georgia', serif; }
  
  header {
    text-align: center; padding: 40px 20px 20px;
    border-bottom: 1px solid rgba(200,168,76,0.2);
  }
  header h1 { font-size: 28px; color: #c8a84c; font-weight: 300; letter-spacing: 3px; }
  header p { font-size: 14px; color: rgba(232,224,208,0.5); margin-top: 8px; }
  
  .filters {
    display: flex; gap: 12px; padding: 16px 20px; justify-content: center; flex-wrap: wrap;
  }
  .filters select, .filters input {
    background: #1a1a22; border: 1px solid rgba(200,168,76,0.3); color: #e8e0d0;
    padding: 8px 14px; border-radius: 6px; font-size: 13px;
  }
  
  .gallery {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto;
  }
  
  .card {
    background: #14141c; border-radius: 12px; overflow: hidden;
    border: 1px solid rgba(200,168,76,0.1); transition: border-color 0.3s;
  }
  .card:hover { border-color: rgba(200,168,76,0.4); }
  
  .card img {
    width: 100%; aspect-ratio: 9/16; object-fit: cover; cursor: pointer;
  }
  
  .card-info { padding: 14px; }
  .card-info .tag {
    display: inline-block; background: rgba(200,168,76,0.15); color: #c8a84c;
    padding: 3px 10px; border-radius: 12px; font-size: 11px; margin-right: 6px;
  }
  .card-info .title { font-size: 15px; margin-top: 8px; }
  .card-info .meta { font-size: 12px; color: rgba(232,224,208,0.4); margin-top: 4px; }
  
  /* Rating */
  .rating { display: flex; gap: 4px; margin-top: 10px; }
  .rating .star {
    width: 28px; height: 28px; cursor: pointer; opacity: 0.3;
    transition: opacity 0.2s;
  }
  .rating .star.active { opacity: 1; }
  .rating .star:hover { opacity: 0.8; }
  
  /* Feedback */
  .feedback { margin-top: 10px; }
  .feedback textarea {
    width: 100%; background: #1a1a22; border: 1px solid rgba(200,168,76,0.2);
    color: #e8e0d0; padding: 8px; border-radius: 6px; font-size: 12px;
    resize: vertical; min-height: 50px;
  }
  .feedback .ref-input {
    margin-top: 6px; display: flex; gap: 6px;
  }
  .feedback input[type="text"] {
    flex: 1; background: #1a1a22; border: 1px solid rgba(200,168,76,0.2);
    color: #e8e0d0; padding: 6px 10px; border-radius: 6px; font-size: 12px;
  }
  .feedback input[type="file"] { display: none; }
  .feedback label {
    background: rgba(200,168,76,0.15); color: #c8a84c; padding: 6px 12px;
    border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap;
  }
  .feedback button {
    background: #c8a84c; color: #0d0d12; border: none; padding: 6px 16px;
    border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600;
    margin-top: 8px;
  }
  
  /* Lightbox / Annotation Mode */
  .lightbox {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
    z-index: 100; flex-direction: column; align-items: center; justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lightbox .annotate-container {
    position: relative; max-width: 95vw; max-height: 85vh;
  }
  .lightbox img { max-width: 100%; max-height: 85vh; object-fit: contain; display: block; }
  .lightbox canvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    cursor: crosshair;
  }
  .annotate-toolbar {
    display: flex; gap: 8px; padding: 10px; align-items: center;
  }
  .annotate-toolbar button {
    background: rgba(200,168,76,0.2); color: #c8a84c; border: 1px solid rgba(200,168,76,0.4);
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  .annotate-toolbar button.active { background: rgba(200,168,76,0.5); }
  .annotate-toolbar input[type="color"] {
    width: 32px; height: 28px; border: none; cursor: pointer; border-radius: 4px;
  }
  .annotate-toolbar input[type="range"] { width: 80px; }
  .annotate-toolbar .label { color: rgba(232,224,208,0.5); font-size: 11px; }
  .annotate-toolbar input[type="text"] {
    background: #1a1a22; border: 1px solid rgba(200,168,76,0.3); color: #e8e0d0;
    padding: 4px 8px; border-radius: 4px; font-size: 12px; width: 200px;
  }
  
  /* Auto score badge */
  .auto-score {
    position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7);
    color: #c8a84c; padding: 3px 8px; border-radius: 10px; font-size: 11px;
  }
  
  .surah-header {
    text-align: center; padding: 30px 20px 10px;
  }
  .surah-header h2 { color: #c8a84c; font-weight: 300; font-size: 20px; }
  .surah-header .arabic { font-size: 24px; direction: rtl; margin-top: 4px; }
  .surah-header .theme { font-size: 13px; color: rgba(232,224,208,0.4); margin-top: 6px; }
  
  .empty { text-align: center; padding: 60px; color: rgba(232,224,208,0.3); }
</style>
</head>
<body>

<header>
  <h1>fatiha.app</h1>
  <p>Generative Islamic Art — Gallery & Feedback</p>
</header>

<div class="filters">
  <select id="surahFilter">
    <option value="all">All Surahs</option>
    <option value="1">1. Al-Fatiha</option>
  </select>
  <select id="sortBy">
    <option value="newest">Newest First</option>
    <option value="highest">Highest Rated</option>
    <option value="unrated">Unrated First</option>
  </select>
</div>

<div id="gallery" class="gallery"></div>

<div id="lightbox" class="lightbox">
  <div class="annotate-toolbar">
    <button onclick="setTool('draw')" id="toolDraw" class="active">✏️ Draw</button>
    <button onclick="setTool('arrow')" id="toolArrow">➡️ Arrow</button>
    <button onclick="setTool('text')" id="toolText">💬 Text</button>
    <button onclick="setTool('circle')" id="toolCircle">⭕ Circle</button>
    <input type="color" id="penColor" value="#ff3333" title="Color">
    <span class="label">Size:</span>
    <input type="range" id="penSize" min="2" max="12" value="4">
    <input type="text" id="annotateText" placeholder="Type annotation text..." style="display:none">
    <button onclick="undoAnnotation()">↩️ Undo</button>
    <button onclick="clearAnnotations()">🗑️ Clear</button>
    <button onclick="saveAnnotation()">💾 Save</button>
    <button onclick="closeLightbox()" style="margin-left:auto;">✕ Close</button>
  </div>
  <div class="annotate-container">
    <img id="lightboxImg" src="">
    <canvas id="annotateCanvas"></canvas>
  </div>
</div>

<script>
// Supabase config
const SUPABASE_URL = 'https://ypniokxbftuebagppxzj.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlwbmlva3hiZnR1ZWJhZ3BweHpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExOTQ2MjcsImV4cCI6MjA4Njc3MDYyN30.u63gpVUX7bOm5WQZkgt1elVWwwSBx_UGektwDTnllhw';

// For now: load iterations from a local JSON manifest
// Later: connect to Supabase
let iterations = [];

async function loadIterations() {
  try {
    const resp = await fetch('iterations.json');
    iterations = await resp.json();
  } catch (e) {
    // Fallback: scan for known files
    iterations = [];
  }
  renderGallery();
}

function renderGallery() {
  const gallery = document.getElementById('gallery');
  
  if (iterations.length === 0) {
    gallery.innerHTML = '<div class="empty">No iterations yet. The pipeline will publish here.</div>';
    return;
  }
  
  const sort = document.getElementById('sortBy').value;
  let sorted = [...iterations];
  if (sort === 'highest') sorted.sort((a,b) => (b.humanScore||0) - (a.humanScore||0));
  else if (sort === 'unrated') sorted.sort((a,b) => (a.humanScore?1:0) - (b.humanScore?1:0));
  else sorted.sort((a,b) => new Date(b.created) - new Date(a.created));
  
  const surah = document.getElementById('surahFilter').value;
  if (surah !== 'all') sorted = sorted.filter(i => i.surah == surah);
  
  gallery.innerHTML = sorted.map((it, idx) => `
    <div class="card">
      <div style="position:relative">
        <img src="${it.image}" alt="${it.title}" onclick="openLightbox('${it.image}', '${it.id||idx}')">
        ${it.autoScore ? `<span class="auto-score">⚡${it.autoScore}</span>` : ''}
      </div>
      <div class="card-info">
        <span class="tag">${it.surahName || 'Al-Fatiha'}</span>
        <span class="tag">${it.verse || 'Bismillah'}</span>
        <span class="tag">v${it.version || idx+1}</span>
        <div class="title">${it.title || 'Iteration ' + (idx+1)}</div>
        <div class="meta">${it.created || ''} · ${it.generator || 'Chris/Opus'}</div>
        
        ${it.builderNotes ? `<div style="margin-top:8px;padding:8px;background:rgba(30,60,30,0.2);border-radius:6px;font-size:11px;">
          <span style="color:#4a8a5a;">🔨 Builder:</span> ${it.builderNotes}
        </div>` : ''}
        ${it.criticNotes ? `<div style="margin-top:4px;padding:8px;background:rgba(60,30,30,0.2);border-radius:6px;font-size:11px;">
          <span style="color:#c8684c;">👁 Critic:</span> ${it.criticNotes}
        </div>` : ''}
        
        <div class="rating" data-id="${it.id || idx}">
          ${[1,2,3,4,5].map(s => `
            <div class="star ${(it.humanScore||0) >= s ? 'active' : ''}" 
                 onclick="rate('${it.id||idx}', ${s})"
                 title="${s} star${s>1?'s':''}">
              ⭐
            </div>
          `).join('')}
        </div>
        
        <div class="feedback">
          <textarea placeholder="Notes (e.g. 'less brown, more pressure variation')" 
                    id="notes-${it.id||idx}"></textarea>
          <div class="ref-input">
            <input type="text" placeholder="Reference URL" id="ref-${it.id||idx}">
            <label for="refimg-${it.id||idx}">📎 Ref Image</label>
            <input type="file" id="refimg-${it.id||idx}" accept="image/*">
          </div>
          <button onclick="submitFeedback('${it.id||idx}')">Submit Feedback</button>
        </div>
      </div>
    </div>
  `).join('');
}

// ============================================================
// ANNOTATION SYSTEM
// ============================================================
let currentTool = 'draw';
let isDrawing = false;
let drawHistory = [];
let currentPath = [];
let currentImageId = null;
let startX, startY;

function openLightbox(src, id) {
  currentImageId = id;
  const img = document.getElementById('lightboxImg');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
  
  img.onload = () => {
    const canvas = document.getElementById('annotateCanvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    
    // Load existing annotations
    const saved = JSON.parse(localStorage.getItem('annotations') || '{}');
    if (saved[id]) {
      const savedImg = new Image();
      savedImg.onload = () => {
        canvas.getContext('2d').drawImage(savedImg, 0, 0);
      };
      savedImg.src = saved[id];
    }
  };
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.annotate-toolbar button').forEach(b => b.classList.remove('active'));
  document.getElementById('tool' + tool.charAt(0).toUpperCase() + tool.slice(1)).classList.add('active');
  document.getElementById('annotateText').style.display = tool === 'text' ? 'block' : 'none';
}

// Canvas drawing handlers
document.addEventListener('DOMContentLoaded', () => {
  const canvas = document.getElementById('annotateCanvas');
  
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
  }
  
  function startDraw(e) {
    e.preventDefault();
    e.stopPropagation();
    isDrawing = true;
    const pos = getPos(e);
    startX = pos.x; startY = pos.y;
    currentPath = [pos];
    
    if (currentTool === 'text') {
      const text = document.getElementById('annotateText').value;
      if (text) {
        const ctx = canvas.getContext('2d');
        ctx.font = 'bold 24px Georgia';
        ctx.fillStyle = document.getElementById('penColor').value;
        ctx.fillText(text, pos.x, pos.y);
        drawHistory.push(canvas.toDataURL());
      }
      isDrawing = false;
    }
  }
  
  function moveDraw(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const pos = getPos(e);
    const ctx = canvas.getContext('2d');
    const color = document.getElementById('penColor').value;
    const size = parseInt(document.getElementById('penSize').value);
    
    if (currentTool === 'draw') {
      ctx.strokeStyle = color;
      ctx.lineWidth = size;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      const prev = currentPath[currentPath.length - 1];
      ctx.beginPath();
      ctx.moveTo(prev.x, prev.y);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      currentPath.push(pos);
    }
  }
  
  function endDraw(e) {
    if (!isDrawing) return;
    isDrawing = false;
    const ctx = canvas.getContext('2d');
    const color = document.getElementById('penColor').value;
    const size = parseInt(document.getElementById('penSize').value);
    const pos = e.changedTouches ? 
      { x: (e.changedTouches[0].clientX - canvas.getBoundingClientRect().left) * (canvas.width / canvas.getBoundingClientRect().width),
        y: (e.changedTouches[0].clientY - canvas.getBoundingClientRect().top) * (canvas.height / canvas.getBoundingClientRect().height) } :
      getPos(e);
    
    if (currentTool === 'arrow') {
      ctx.strokeStyle = color;
      ctx.lineWidth = size;
      ctx.lineCap = 'round';
      // Shaft
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      // Arrowhead
      const angle = Math.atan2(pos.y - startY, pos.x - startX);
      const headLen = size * 5;
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      ctx.lineTo(pos.x - headLen * Math.cos(angle - 0.4), pos.y - headLen * Math.sin(angle - 0.4));
      ctx.moveTo(pos.x, pos.y);
      ctx.lineTo(pos.x - headLen * Math.cos(angle + 0.4), pos.y - headLen * Math.sin(angle + 0.4));
      ctx.stroke();
    }
    
    if (currentTool === 'circle') {
      ctx.strokeStyle = color;
      ctx.lineWidth = size;
      const rx = Math.abs(pos.x - startX);
      const ry = Math.abs(pos.y - startY);
      const cx = (startX + pos.x) / 2;
      const cy = (startY + pos.y) / 2;
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx/2, ry/2, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    
    drawHistory.push(canvas.toDataURL());
  }
  
  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', moveDraw);
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('touchstart', startDraw, {passive: false});
  canvas.addEventListener('touchmove', moveDraw, {passive: false});
  canvas.addEventListener('touchend', endDraw);
});

function undoAnnotation() {
  drawHistory.pop();
  const canvas = document.getElementById('annotateCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (drawHistory.length > 0) {
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0);
    img.src = drawHistory[drawHistory.length - 1];
  }
}

function clearAnnotations() {
  const canvas = document.getElementById('annotateCanvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  drawHistory = [];
}

function saveAnnotation() {
  const canvas = document.getElementById('annotateCanvas');
  const dataUrl = canvas.toDataURL('image/png');
  
  // Save to localStorage
  const annotations = JSON.parse(localStorage.getItem('annotations') || '{}');
  annotations[currentImageId] = dataUrl;
  localStorage.setItem('annotations', JSON.stringify(annotations));
  
  // Also save as downloadable image (composited)
  const img = document.getElementById('lightboxImg');
  const composite = document.createElement('canvas');
  composite.width = img.naturalWidth;
  composite.height = img.naturalHeight;
  const ctx = composite.getContext('2d');
  ctx.drawImage(img, 0, 0);
  ctx.drawImage(canvas, 0, 0);
  
  const link = document.createElement('a');
  link.download = (currentImageId || 'annotated') + '-feedback.png';
  link.href = composite.toDataURL('image/png');
  link.click();
  
  alert('Annotation saved! Downloaded as ' + link.download);
}

function rate(id, score) {
  // Update UI
  const stars = document.querySelectorAll(`.rating[data-id="${id}"] .star`);
  stars.forEach((s, i) => s.classList.toggle('active', i < score));
  
  // Save to localStorage for now (Supabase later)
  const ratings = JSON.parse(localStorage.getItem('ratings') || '{}');
  ratings[id] = score;
  localStorage.setItem('ratings', JSON.stringify(ratings));
  
  console.log(`Rated ${id}: ${score} stars`);
}

function submitFeedback(id) {
  const notes = document.getElementById(`notes-${id}`).value;
  const ref = document.getElementById(`ref-${id}`).value;
  
  const feedback = JSON.parse(localStorage.getItem('feedback') || '{}');
  feedback[id] = { notes, ref, timestamp: new Date().toISOString() };
  localStorage.setItem('feedback', JSON.stringify(feedback));
  
  // Clear inputs
  document.getElementById(`notes-${id}`).value = '';
  document.getElementById(`ref-${id}`).value = '';
  
  console.log(`Feedback for ${id}:`, { notes, ref });
  alert('Feedback saved! Will feed into next generation.');
}

// Filters
document.getElementById('surahFilter').addEventListener('change', renderGallery);
document.getElementById('sortBy').addEventListener('change', renderGallery);

loadIterations();
</script>
</body>

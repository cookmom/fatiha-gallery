<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Fatiha — Parametric Audio-Reactive Door</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@2/lib/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5.brush@2.0.0-beta"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// ===== GLOBALS =====
var doorImg;
var audioCtx, analyser, audioSource;
var timeData, freqData;
var audioReady = false;
var animStart = 0;

// Smoothed audio
var sAmp = 0, sFreq = 0.5, sBeat = 0, prevAmp = 0;

// Particles
var particles = [];

// Door geometry constants (for overlay drawing)
var DX = 110, DW = 860, DY = 80, DH = 1760;
var CX = 540, SPRING_Y = 580;

function setup() {
  createCanvas(1080, 1920, WEBGL);
  brush.load();
  pixelDensity(1);
  frameRate(30);
  randomSeed(42);

  // Render the static door painting
  renderDoor();
  // Capture as reusable image
  doorImg = get();

  // Init particles
  for (var i = 0; i < 60; i++) {
    particles.push({
      x: random(-400, 400),
      y: random(-800, 900),
      sz: random(1.5, 4),
      spd: random(0.3, 1.2),
      alpha: random(15, 55),
      drift: random(-0.15, 0.15),
      phase: random(TWO_PI)
    });
  }

  animStart = millis();
  window._setupDone = true;
  console.log('Setup complete at', animStart.toFixed(0) + 'ms');
  initAudio();
}

// ===== RENDER STATIC DOOR (from fatiha-door.html M10) =====
function renderDoor() {
  push();
  translate(-width / 2, -height / 2);
  background(242, 234, 218);
  brush.scaleBrushes(2.5);
  brush.wiggle(2);

  function pencilW() { return random(0.3, 2.5); }
  function pencilWLight() { return random(0.3, 1.2); }
  function crayonW() { return random(1.0, 4.0); }

  var W = 1080, H = 1920, cx = W / 2;
  var doorW = 860, doorH = 1760;
  var doorX = (W - doorW) / 2, doorY = (H - doorH) / 2;
  var halfW = doorW / 2;

  var archSpringY = doorY + 500;
  var centerOffset = halfW * 0.6;
  var leftArcCx = cx + centerOffset;
  var rightArcCx = cx - centerOffset;
  var arcR = halfW + centerOffset;
  var archPeakY = archSpringY - sqrt(arcR * arcR - centerOffset * centerOffset);

  var PENCIL = "#9a9080";
  var PENCIL2 = "#b0a898";

  brush.noFill(); brush.noHatch();

  // LAYER 1: WATERCOLOR WASHES
  brush.noStroke();
  brush.fill("#1040A0", 75); brush.fillBleed(0.6);
  brush.rect(doorX + 40, doorY + 60, doorW * 0.55, 550);
  brush.fill("#C88800", 70); brush.fillBleed(0.55);
  brush.rect(doorX + 80, archSpringY - 50, doorW * 0.5, 400);
  brush.fill("#105830", 80); brush.fillBleed(0.55);
  brush.rect(doorX + 60, archSpringY + 450, doorW * 0.55, 550);
  brush.noFill();

  // LAYER 2: PENCIL DOOR
  drawFrameVaried(doorX, archSpringY, doorW, doorY + doorH - archSpringY, PENCIL, 0.8, 2.5);
  drawFrameVaried(doorX - 10, archSpringY - 6, doorW + 20, doorY + doorH - archSpringY + 10, PENCIL2, 0.3, 1.5);

  drawPointedArch(cx, archSpringY, halfW, leftArcCx, rightArcCx, arcR, PENCIL, 1.2);
  var ihw = halfW - 30, ico = ihw * 0.6;
  drawPointedArch(cx, archSpringY, ihw, cx + ico, cx - ico, ihw + ico, PENCIL2, 0.7);

  brush.set("2H", PENCIL, pencilW());
  var cdTop = archSpringY + 3, cdBot = doorY + doorH - 18;
  brush.spline([[cx, cdTop, 0.4], [cx, cdTop + (cdBot - cdTop) * 0.3, 1.0], [cx, cdTop + (cdBot - cdTop) * 0.6, 0.5], [cx, cdBot, 0.8]]);

  var pY = archSpringY + 18, pBot = doorY + doorH - 25, pH = pBot - pY;
  var lX = doorX + 16, lW = cx - 14 - lX;
  var rX = cx + 14, rW = doorX + doorW - 16 - rX;
  drawFrameVaried(lX, pY, lW, pH, PENCIL, 0.6, 2.2);
  drawFrameVaried(rX, pY, rW, pH, PENCIL, 0.6, 2.2);
  drawFrameVaried(lX + 14, pY + 14, lW - 28, pH - 28, PENCIL2, 0.3, 1.2);
  drawFrameVaried(rX + 14, pY + 14, rW - 28, pH - 28, PENCIL2, 0.3, 1.2);

  var mg = 26, iT = pY + mg, iH = pH - 2 * mg;
  var topH = iH * 0.22, gH = iH * 0.03, midH = iH * 0.50;
  var d1 = iT + topH, d2 = d1 + gH, d3 = d2 + midH, d4 = d3 + gH;
  [lX, rX].forEach(function(px, i) {
    var pw = i === 0 ? lW : rW;
    [d1, d2, d3, d4].forEach(function(dy) {
      brush.set("2H", PENCIL2, pencilWLight());
      brush.line(px + 10, dy, px + pw - 10, dy);
    });
  });

  var lCx = lX + lW / 2, rCx = rX + rW / 2, piW = lW - 2 * mg;
  var topCY = iT + topH / 2, topR = min(piW / 2, topH / 2) * 0.85;
  var midCY = d2 + midH / 2, midR = min(piW / 2, midH / 2) * 0.85;
  var botCY = d4 + topH / 2;

  brush.noFill();
  brush.set("2H", PENCIL2, pencilWLight()); brush.circle(lCx, topCY, topR * 2, true);
  brush.set("2H", PENCIL2, pencilWLight()); brush.circle(rCx, topCY, topR * 2, true);
  brush.set("2H", PENCIL2, pencilWLight()); brush.circle(lCx, midCY, midR * 2, true);
  brush.set("2H", PENCIL2, pencilWLight()); brush.circle(rCx, midCY, midR * 2, true);
  brush.set("2H", PENCIL2, pencilWLight()); brush.circle(lCx, botCY, topR * 2, true);
  brush.set("2H", PENCIL2, pencilWLight()); brush.circle(rCx, botCY, topR * 2, true);

  var tCY = archPeakY + (archSpringY - archPeakY) * 0.45;
  var tR = (archSpringY - archPeakY) * 0.15;
  brush.set("2H", PENCIL2, pencilWLight()); brush.circle(cx, tCY, tR * 2, true);

  brush.set("2H", PENCIL2, pencilWLight()); brush.line(lX + mg, iT, lX + lW - mg, iT + topH);
  brush.set("2H", PENCIL2, pencilWLight()); brush.line(lX + lW - mg, iT, lX + mg, iT + topH);
  brush.set("2H", PENCIL2, pencilWLight()); brush.line(rX + mg, iT, rX + rW - mg, iT + topH);
  brush.set("2H", PENCIL2, pencilWLight()); brush.line(rX + rW - mg, iT, rX + mg, iT + topH);
  brush.set("2H", PENCIL2, pencilWLight()); brush.line(lX + mg, d2, lX + lW - mg, d2 + midH);
  brush.set("2H", PENCIL2, pencilWLight()); brush.line(lX + lW - mg, d2, lX + mg, d2 + midH);
  brush.set("2H", PENCIL2, pencilWLight()); brush.line(rX + mg, d2, rX + rW - mg, d2 + midH);
  brush.set("2H", PENCIL2, pencilWLight()); brush.line(rX + rW - mg, d2, rX + mg, d2 + midH);

  brush.set("2H", PENCIL, random(1.5, 2.5));
  brush.line(doorX - 10, doorY + doorH - 6, doorX + doorW + 10, doorY + doorH - 6);

  // LAYER 3: CRAYON SCRIBBLES
  brush.noFill(); brush.noHatch();
  brush.wiggle(8);
  brush.set("2B", "#4A7A5A", crayonW()); brush.line(cx - 80, archSpringY - 20, cx - 30, archSpringY + 15);
  brush.set("2B", "#4A7A5A", crayonW()); brush.line(cx + 20, archSpringY - 10, cx + 70, archSpringY + 20);
  brush.set("2B", "#4A7A5A", crayonW()); brush.line(doorX + 30, archSpringY + 60, doorX + 90, archSpringY + 40);
  brush.set("2B", "#4A7EC2", crayonW()); brush.line(lCx - 60, d1 - 5, lCx - 10, d1 + 10);
  brush.set("2B", "#4A7EC2", crayonW()); brush.line(rCx + 10, d3 - 8, rCx + 60, d3 + 5);
  brush.set("2B", "#C9A832", crayonW()); brush.line(lX + 20, pY + 10, lX + 70, pY - 5);
  brush.set("2B", "#C9A832", crayonW()); brush.line(rX + rW - 70, pBot - 15, rX + rW - 20, pBot + 5);
  brush.wiggle(2);

  // LAYER 4: SECTION FILLS
  brush.noStroke();
  brush.fill("#4010A0", 120); brush.fillBleed(0.4);
  brush.rect(lX + mg + 5, iT + 5, piW - 10, topH - 10);
  brush.fill("#B01008", 110); brush.fillBleed(0.4);
  brush.rect(rX + mg + 5, d2 + 5, piW - 10, midH * 0.3);
  brush.fill("#085868", 130); brush.fillBleed(0.4);
  brush.circle(cx, tCY, tR * 1.6);
  brush.noFill();

  // LAYER 5: THIN PAINT LINES
  brush.set("marker", "#C9A832", 0.8);
  brush.line(doorX + 120, archSpringY + 200, doorX + doorW - 200, doorY + doorH - 300);
  brush.set("marker", "#4A7EC2", 0.7);
  brush.line(doorX + doorW - 100, archSpringY + 160, doorX + 220, doorY + doorH - 250);

  pop();
}

// ===== AUDIO =====
async function initAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.82;

    var response = await fetch('bismillah.mp3');
    var buf = await response.arrayBuffer();
    var audioBuffer = await audioCtx.decodeAudioData(buf);

    audioSource = audioCtx.createBufferSource();
    audioSource.buffer = audioBuffer;
    audioSource.connect(analyser);
    analyser.connect(audioCtx.destination);

    timeData = new Uint8Array(analyser.frequencyBinCount);
    freqData = new Uint8Array(analyser.frequencyBinCount);

    audioSource.start(0);
    audioReady = true;
    animStart = millis();
    console.log('Audio started, duration:', audioBuffer.duration.toFixed(1) + 's');
  } catch (e) {
    console.log('Audio fallback (simulated):', e.message);
  }
}

function getAudioParams() {
  if (audioReady && analyser) {
    analyser.getByteTimeDomainData(timeData);
    analyser.getByteFrequencyData(freqData);

    // RMS amplitude
    var sum = 0;
    for (var i = 0; i < timeData.length; i++) {
      var v = (timeData[i] - 128) / 128.0;
      sum += v * v;
    }
    var rms = Math.sqrt(sum / timeData.length);

    // Spectral centroid (normalized 0-1)
    var wSum = 0, tEnergy = 0;
    for (var i = 0; i < freqData.length; i++) {
      wSum += i * freqData[i];
      tEnergy += freqData[i];
    }
    var centroid = tEnergy > 0 ? wSum / (tEnergy * freqData.length) : 0.5;

    return { amplitude: rms, freq: centroid };
  }

  // Simulated audio envelope (voice-like)
  var t = (millis() - animStart) / 1000;
  var a = 0;
  if (t > 0.5) {
    a = 0.3 + 0.18 * sin(t * 2.5) + 0.12 * sin(t * 6.3) + 0.07 * sin(t * 11.7);
    a *= ss(0.5, 1.8, t); // fade in
    if (t > 5.0) a *= ss(6.0, 5.0, t); // fade out
    a = constrain(a, 0, 0.75);
  }
  var fc = 0.4 + 0.18 * sin(t * 1.6) + 0.1 * sin(t * 4.1);
  return { amplitude: a, freq: constrain(fc, 0.1, 0.9) };
}

function ss(e0, e1, x) { // smoothstep
  var t = constrain((x - e0) / (e1 - e0), 0, 1);
  return t * t * (3 - 2 * t);
}

// ===== DRAW LOOP =====
function draw() {
  var elapsed = (millis() - animStart) / 1000;
  var p = getAudioParams();

  // Smooth values
  sAmp = lerp(sAmp, p.amplitude, 0.18);
  sFreq = lerp(sFreq, p.freq, 0.12);

  // Beat detection
  if (p.amplitude > prevAmp + 0.05 && p.amplitude > 0.1) sBeat = 1.0;
  sBeat *= 0.88;
  prevAmp = lerp(prevAmp, p.amplitude, 0.1);

  // --- ANIMATION PARAMETERS ---

  // Progressive reveal: painting emerges from paper over 7s (full audio)
  var reveal = ss(0, 7, elapsed);

  // Breathing: scale pulsation driven by audio + gentle autonomous oscillation
  var autoBreath = sin(elapsed * 1.8) * 0.008; // always-on gentle breathing
  var breathScale = 1.0 + sAmp * 0.04 + autoBreath;

  // Color warmth: high freq → warm (gold), low freq → cool (lapis)
  // Also shifts over time for visible change between screenshots
  var timeWarmth = sin(elapsed * 0.7) * 6;
  var warmth = map(sFreq, 0.2, 0.8, -15, 20) + timeWarmth;

  // --- RENDER ---
  background(242, 234, 218);

  // Draw door image with strip-based progressive reveal + breathing + color shift
  push();
  scale(breathScale);
  imageMode(CORNER);

  var numStrips = 24;
  var stripH = ceil(height / numStrips) + 1;

  for (var i = 0; i < numStrips; i++) {
    // Top strips reveal first, bottom last — wide stagger for dramatic effect
    var stripT = i / numStrips;
    var stripReveal = ss(stripT * 0.85, stripT * 0.85 + 0.2, reveal);
    if (stripReveal < 0.005) continue;

    var sy = i * (height / numStrips);
    var r = constrain(255 + warmth, 230, 255);
    var b = constrain(255 - warmth, 230, 255);
    tint(r, 252, b, stripReveal * 255);
    image(doorImg, -width / 2, -height / 2 + sy, width, stripH, 0, sy, width, stripH);
  }
  pop();

  noTint();

  // --- OVERLAYS ---

  // Geometric pulse: arch and frame glow on beats
  if (sBeat > 0.04 && reveal > 0.25) {
    drawArchPulse(sBeat * reveal, elapsed);
  }

  // Ambient glow: warm/cool radiance at painting center
  if (reveal > 0.1) {
    drawAmbientGlow(sAmp * reveal, warmth, elapsed);
  }

  // Floating gold particles: dust motes / light
  if (reveal > 0.15) {
    drawParticles(sAmp, elapsed, reveal);
  }

  // Subtle scan line (progressive reveal marker)
  if (reveal > 0.01 && reveal < 0.98) {
    drawRevealEdge(reveal, elapsed);
  }
}

// ===== OVERLAY EFFECTS =====

function drawArchPulse(beat, t) {
  push();
  translate(-width / 2, -height / 2);
  noFill();

  var alpha = beat * 55;
  var w = 0.8 + beat * 2.5;

  // Gold glow on arch
  stroke(205, 175, 85, alpha);
  strokeWeight(w);

  // Pointed arch approximation
  beginShape();
  for (var i = 0; i <= 50; i++) {
    var frac = i / 50;
    var x = DX + DW * frac;
    var dx = x - CX;
    var R = DW * 0.72;
    var y = SPRING_Y - sqrt(max(0, R * R - dx * dx)) * 0.62;
    y = max(y, SPRING_Y - 430);
    vertex(x, y);
  }
  endShape();

  // Frame outline
  strokeWeight(w * 0.6);
  stroke(205, 175, 85, alpha * 0.6);
  rect(DX, SPRING_Y, DW, 1260);

  // Center divider
  strokeWeight(w * 0.4);
  line(CX, SPRING_Y + 18, CX, SPRING_Y + 1240);

  pop();
}

function drawAmbientGlow(amp, warmth, t) {
  push();
  noStroke();

  // Golden radiance centered on arch — intensifies with amplitude
  var baseAlpha = 12 + amp * 35;
  var gr = constrain(225 + warmth, 200, 255);
  var gb = constrain(180 - warmth * 0.5, 140, 210);

  for (var i = 6; i > 0; i--) {
    var sz = 200 + i * 180;
    var a = baseAlpha / (i * 0.6);
    fill(gr, 210, gb, a);
    ellipse(0, -250 + sin(t * 0.5) * 40, sz * (1 + sin(t * 0.12) * 0.06), sz * 1.4);
  }

  // Secondary cool glow at bottom
  var coolAlpha = 8 + amp * 20;
  for (var i = 3; i > 0; i--) {
    var sz2 = 150 + i * 120;
    fill(150, 180, constrain(220 + warmth * 0.3, 200, 240), coolAlpha / i);
    ellipse(0, 500, sz2, sz2 * 0.8);
  }
  pop();
}

function drawParticles(amp, t, reveal) {
  push();
  noStroke();

  for (var i = 0; i < particles.length; i++) {
    var pt = particles[i];
    pt.y -= pt.spd * (0.5 + amp * 3);
    pt.x += pt.drift + sin(t * 0.6 + pt.phase) * 0.4;

    if (pt.y < -height / 2 - 30) {
      pt.y = height / 2 + random(10, 120);
      pt.x = random(-400, 400);
    }

    var a = pt.alpha * (0.5 + amp * 2.5) * reveal;
    // Gold / warm white particles with gentle twinkle
    var twinkle = 0.5 + 0.5 * sin(t * 3 + pt.phase * 7);
    a *= twinkle;
    var warmR = 220 + sin(pt.phase + t * 0.3) * 20;
    fill(warmR, 195, 110, a);
    var sz = pt.sz * (0.9 + amp * 0.8);
    ellipse(pt.x, pt.y, sz, sz);

    // Bright core on large particles
    if (pt.sz > 3 && twinkle > 0.7) {
      fill(255, 240, 200, a * 0.6);
      ellipse(pt.x, pt.y, sz * 0.4, sz * 0.4);
    }
  }
  pop();
}

function drawRevealEdge(reveal, t) {
  // Golden light band at the reveal frontier — like light washing down
  push();
  noStroke();

  var edgeY = -height / 2 + reveal * height;
  var edgeAlpha = 30 + 15 * sin(t * 2.5);

  // Wide soft gradient band
  for (var i = 0; i < 8; i++) {
    var yOff = (i - 4) * 15;
    var falloff = 1 - abs(i - 3.5) / 4;
    var a = edgeAlpha * falloff * falloff;
    fill(225, 205, 140, a);
    rect(-width / 2, edgeY + yOff, width, 12);
  }

  // Brighter core line
  fill(240, 220, 160, edgeAlpha * 0.5);
  rect(-width / 2, edgeY - 2, width, 4);
  pop();
}

// ===== INTERACTION =====
function mousePressed() {
  if (!audioReady) initAudio();
}

// ===== DOOR GEOMETRY HELPERS =====
function drawFrameVaried(x, y, w, h, col, wMin, wMax) {
  brush.set("2H", col, random(wMin, wMax)); brush.line(x, y, x + w, y);
  brush.set("2H", col, random(wMin, wMax)); brush.line(x + w, y, x + w, y + h);
  brush.set("2H", col, random(wMin, wMax)); brush.line(x + w, y + h, x, y + h);
  brush.set("2H", col, random(wMin, wMax)); brush.line(x, y + h, x, y);
}
function drawPointedArch(cx, springY, halfW, leftCx, rightCx, R, col, weight) {
  var steps = 50;
  for (var i = 0; i < steps; i++) {
    var t1 = i / steps, t2 = (i + 1) / steps;
    var pressureMod = 0.4 + 1.6 * sin(PI * t1);
    brush.set("2H", col, constrain(weight * pressureMod * random(0.6, 1.4), 0.3, 2.5));
    var x1 = (cx - halfW) + halfW * t1, x2 = (cx - halfW) + halfW * t2;
    var dx1 = x1 - leftCx, dx2 = x2 - leftCx;
    var y1 = springY - sqrt(max(0, R * R - dx1 * dx1));
    var y2 = springY - sqrt(max(0, R * R - dx2 * dx2));
    brush.line(x1, y1, x2, y2);
  }
  for (var i = 0; i < steps; i++) {
    var t1 = i / steps, t2 = (i + 1) / steps;
    var pressureMod = 0.4 + 1.6 * sin(PI * t1);
    brush.set("2H", col, constrain(weight * pressureMod * random(0.6, 1.4), 0.3, 2.5));
    var x1 = cx + halfW * t1, x2 = cx + halfW * t2;
    var dx1 = x1 - rightCx, dx2 = x2 - rightCx;
    var y1 = springY - sqrt(max(0, R * R - dx1 * dx1));
    var y2 = springY - sqrt(max(0, R * R - dx2 * dx2));
    brush.line(x1, y1, x2, y2);
  }
}
</script>
</body>
</html>
